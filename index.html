<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publicar mensaje</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#006eff,#1b1b1b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

/* TARJETA */

.panel{
background:#111;
padding:35px;
border-radius:15px;
width:100%;
max-width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
text-align:center;
}

/* TITULO */

.panel h1{
margin-top:0;
margin-bottom:20px;
font-size:24px;
}

/* TEXTAREA */

textarea{
width:100%;
height:140px;
border:none;
border-radius:10px;
padding:12px;
font-size:15px;
resize:none;
outline:none;
background:#1f1f1f;
color:white;
}

/* BOTON */

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0077ff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0050fc;
transform:scale(1.03);
}

/* MENSAJE INFERIOR */

.info{
margin-top:15px;
font-size:13px;
color:#9ca3af;
}

/* RESPONSIVE */

@media (max-width:480px){

.panel{
padding:25px;
}

.panel h1{
font-size:20px;
}

textarea{
height:120px;
}

}

</style>

</head>
<body>

<div class="panel">

<h1>Publicar mensaje</h1>

<textarea id="mensaje" placeholder="Escribe tu mensaje para el equipo..."></textarea>

<button onclick="publicar()"> Publicar mensaje</button>

<div class="info">
Los mensajes aparecerán automáticamente en la página del club.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDnjyVkkqz8J7aN6xFN2oyDVT3sHgmYZUI",
authDomain: "voleyweb-82f7d.firebaseapp.com",
projectId: "voleyweb-82f7d",
storageBucket: "voleyweb-82f7d.firebasestorage.app",
messagingSenderId: "1081023239285",
appId: "1:1081023239285:web:084825db1699ac97b2543c",
measurementId: "G-BYFGNWEWJW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.publicar = async function(){

let texto=document.getElementById("mensaje").value;

if(texto===""){
alert("Escribe un mensaje");
return;
}

await addDoc(collection(db,"mensajes"),{
texto:texto,
fecha:Date.now()
});

document.getElementById("mensaje").value="";

alert("✅ Mensaje publicado correctamente");

}

</script>

</body>
</html>
